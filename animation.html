<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printing Mechanism - Continuous Feed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Changed background to dark green */
            background-color: #1a4321; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        svg {
            width: 100%;
            height: 100%;
            max-width: 1200px;
        }
        
        .print-head {
            animation: printHeadMove 4s ease-in-out 5 forwards;
        }
        .carriage {
            animation: carriageFeed 20s ease-in-out forwards;
        }
        
        .gear-l-cw { animation: gearRotateLargeCW 20s ease-in-out forwards; }
        .gear-s-ccw { animation: gearRotateSmallCCW 20s ease-in-out forwards; }
        .gear-s-cw { animation: gearRotateSmallCW 20s ease-in-out forwards; }
        .gear-l-ccw { animation: gearRotateLargeCCW 20s ease-in-out forwards; }

        @keyframes printHeadMove {
            0% { transform: translate(150px, 250px); }
            45%, 50% { transform: translate(900px, 250px); }
            95%, 100% { transform: translate(150px, 250px); }
        }

        @keyframes carriageFeed {
            0%, 17.5% { transform: translateY(0); }
            20%, 37.5% { transform: translateY(60px); }
            40%, 57.5% { transform: translateY(120px); }
            60%, 77.5% { transform: translateY(180px); }
            80%, 97.5% { transform: translateY(240px); }
            100% { transform: translateY(300px); }
        }

        @keyframes gearRotateLargeCW {
            0%, 17.5% { transform: rotate(0deg); }
            20%, 37.5% { transform: rotate(90deg); }
            40%, 57.5% { transform: rotate(180deg); }
            60%, 77.5% { transform: rotate(270deg); }
            80%, 97.5% { transform: rotate(360deg); }
            100% { transform: rotate(450deg); }
        }
        @keyframes gearRotateSmallCCW {
            0%, 17.5% { transform: rotate(0deg); }
            20%, 37.5% { transform: rotate(-150deg); }
            40%, 57.5% { transform: rotate(-300deg); }
            60%, 77.5% { transform: rotate(-450deg); }
            80%, 97.5% { transform: rotate(-600deg); }
            100% { transform: rotate(-750deg); }
        }
        @keyframes gearRotateSmallCW {
            0%, 17.5% { transform: rotate(0deg); }
            20%, 37.5% { transform: rotate(150deg); }
            40%, 57.5% { transform: rotate(300deg); }
            60%, 77.5% { transform: rotate(450deg); }
            80%, 97.5% { transform: rotate(600deg); }
            100% { transform: rotate(750deg); }
        }
        @keyframes gearRotateLargeCCW {
            0%, 17.5% { transform: rotate(0deg); }
            20%, 37.5% { transform: rotate(-90deg); }
            40%, 57.5% { transform: rotate(-180deg); }
            60%, 77.5% { transform: rotate(-270deg); }
            80%, 97.5% { transform: rotate(-360deg); }
            100% { transform: rotate(-450deg); }
        }
    </style>
</head>
<body>

<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <pattern id="chain-v" x="0" y="0" width="16" height="60" patternUnits="userSpaceOnUse">
            <circle cx="8" cy="30" r="6" fill="#666" />
            <circle cx="8" cy="60" r="6" fill="#666" />
            <circle cx="8" cy="0" r="6" fill="#666" />
            <rect x="2" y="30" width="12" height="30" fill="#666" />
            <circle cx="-5" cy="45" r="8" fill="black" />
            <circle cx="21" cy="45" r="8" fill="black" />

            <circle cx="8" cy="0" r="8" fill="#aaa" />
            <circle cx="8" cy="30" r="8" fill="#aaa" />
            <circle cx="8" cy="60" r="8" fill="#aaa" />
            <rect x="0" y="0" width="16" height="30" fill="#aaa" />
            <circle cx="-6" cy="15" r="9" fill="black" />
            <circle cx="22" cy="15" r="9" fill="black" />

            <circle cx="8" cy="0" r="2.5" fill="#222" />
            <circle cx="8" cy="30" r="2.5" fill="#222" />
            <circle cx="8" cy="60" r="2.5" fill="#222" />
        </pattern>

        <g id="gear-tooth-large">
            <path d="M -6 -20 L 6 -20 L 4 -26 L -4 -26 Z" fill="#999" stroke="#444" stroke-width="1" stroke-linejoin="round"/>
        </g>
        <g id="gear-large">
            <circle cx="0" cy="0" r="20" fill="#999" stroke="#444" stroke-width="1"/>
            <circle cx="0" cy="0" r="6" fill="#333" />
            <use href="#gear-tooth-large" transform="rotate(0)" />
            <use href="#gear-tooth-large" transform="rotate(45)" />
            <use href="#gear-tooth-large" transform="rotate(90)" />
            <use href="#gear-tooth-large" transform="rotate(135)" />
            <use href="#gear-tooth-large" transform="rotate(180)" />
            <use href="#gear-tooth-large" transform="rotate(225)" />
            <use href="#gear-tooth-large" transform="rotate(270)" />
            <use href="#gear-tooth-large" transform="rotate(315)" />
        </g>

        <g id="gear-tooth-small">
            <path d="M -5 -12 L 5 -12 L 3 -18 L -3 -18 Z" fill="#999" stroke="#444" stroke-width="1" stroke-linejoin="round"/>
        </g>
        <g id="gear-small">
            <circle cx="0" cy="0" r="12" fill="#999" stroke="#444" stroke-width="1"/>
            <circle cx="0" cy="0" r="4" fill="#333" />
            <use href="#gear-tooth-small" transform="rotate(0)" />
            <use href="#gear-tooth-small" transform="rotate(60)" />
            <use href="#gear-tooth-small" transform="rotate(120)" />
            <use href="#gear-tooth-small" transform="rotate(180)" />
            <use href="#gear-tooth-small" transform="rotate(240)" />
            <use href="#gear-tooth-small" transform="rotate(300)" />
        </g>

        <clipPath id="print-head-clip">
            <rect x="0" y="0" width="190" height="140" rx="25" />
        </clipPath>
    </defs>

    <rect x="130" y="180" width="980" height="520" rx="20" fill="#e6d5b8" stroke="#8b5a2b" stroke-width="8" />

    <rect x="40" y="-50" width="16" height="1000" fill="url(#chain-v)" />
    <rect x="88" y="-50" width="16" height="1000" fill="url(#chain-v)" />

    <g class="carriage">
        <rect x="80" y="250" width="1120" height="40" fill="black" />
        <rect x="80" y="350" width="1120" height="40" fill="black" />

        <rect x="1140" y="230" width="50" height="180" rx="25" fill="#232323" />

        <rect x="25" y="190" width="94" height="240" rx="47" fill="#232323" />

        <g class="gear-l-cw" style="transform-origin: 72px 230px;">
            <use href="#gear-large" x="72" y="230" />
        </g>
        <g class="gear-s-ccw" style="transform-origin: 72px 268px;">
            <use href="#gear-small" x="72" y="268" transform="rotate(30 72 268)" />
        </g>
        <g class="gear-s-cw" style="transform-origin: 72px 298px;">
            <use href="#gear-small" x="72" y="298" />
        </g>
        <g class="gear-l-ccw" style="transform-origin: 72px 336px;">
            <use href="#gear-large" x="72" y="336" transform="rotate(22.5 72 336)" />
        </g>

        <circle cx="50" cy="390" r="14" fill="#5bcf5b" />
        <circle cx="94" cy="390" r="14" fill="#f43f3f" />

        <g class="print-head">
            <g transform="translate(42, -65)">
                <rect x="0" y="0" width="20" height="60" rx="8" fill="#4dd0e1" stroke="black" stroke-width="3"/>
                <rect x="0" y="45" width="20" height="15" fill="#a0a0a0" stroke="black" stroke-width="3"/>
                <rect x="-3" y="60" width="26" height="5" fill="black" />
            </g>
            <g transform="translate(68, -65)">
                <rect x="0" y="0" width="20" height="60" rx="8" fill="#e040fb" stroke="black" stroke-width="3"/>
                <rect x="0" y="45" width="20" height="15" fill="#a0a0a0" stroke="black" stroke-width="3"/>
                <rect x="-3" y="60" width="26" height="5" fill="black" />
            </g>
            <g transform="translate(94, -65)">
                <rect x="0" y="0" width="20" height="60" rx="8" fill="#ffca28" stroke="black" stroke-width="3"/>
                <rect x="0" y="45" width="20" height="15" fill="#a0a0a0" stroke="black" stroke-width="3"/>
                <rect x="-3" y="60" width="26" height="5" fill="black" />
            </g>
            <g transform="translate(120, -65)">
                <rect x="0" y="0" width="20" height="60" rx="8" fill="#212121" stroke="black" stroke-width="3"/>
                <rect x="0" y="45" width="20" height="15" fill="#a0a0a0" stroke="black" stroke-width="3"/>
                <rect x="-3" y="60" width="26" height="5" fill="black" />
            </g>

            <rect x="0" y="0" width="190" height="140" rx="25" fill="#555555" />

            <rect x="10" y="15" width="170" height="35" rx="8" fill="#66bb6a" stroke="#333" stroke-width="4"/>
            <text x="18" y="38" font-family="'Courier New', Courier, monospace" font-size="14" fill="#1b5e20" font-weight="bold">PRINTING...................</text>

            <g clip-path="url(#print-head-clip)">
                <rect x="0" y="65" width="190" height="8" fill="#f44336" />  
                <rect x="0" y="85" width="190" height="8" fill="#fbc02d" />  
                <rect x="0" y="105" width="190" height="8" fill="#29b6f6" /> 
                <rect x="0" y="125" width="190" height="8" fill="#8bc34a" /> 
            </g>
        </g>
    </g>
</svg>

</body>
</html>
